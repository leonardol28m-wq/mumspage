<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Productos y Stock — Velow Admin</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>

<div class="admin-layout" id="admin-layout">

  <!-- Sidebar -->
  <aside class="admin-sidebar">
    <div class="admin-logo">
      <span class="admin-logo-brand">VELOW</span>
      <span class="admin-logo-tag">Panel Admin</span>
    </div>
    <nav class="admin-nav">
      <div class="admin-nav-section">Tienda</div>
      <a href="index.html" class="admin-nav-link">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Dashboard
      </a>
      <a href="productos.html" class="admin-nav-link active">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 7H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
        Productos y Stock
      </a>
      <a href="pedidos.html" class="admin-nav-link">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        Pedidos
      </a>
      <div class="admin-nav-section" style="margin-top:16px">Herramientas</div>
      <a href="../index.html" target="_blank" class="admin-nav-link">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        Ver tienda
      </a>
    </nav>
    <div class="admin-sidebar-footer">
      Sesión activa
      <a href="#" id="btn-logout">Cerrar sesión</a>
    </div>
  </aside>

  <!-- Main -->
  <main class="admin-main">
    <div class="admin-topbar">
      <h1 class="admin-page-title">Productos y Stock</h1>
      <div style="display:flex;gap:10px">
        <button class="btn btn-secondary btn-sm" id="btn-export">
          📄 Exportar products.js
        </button>
      </div>
    </div>

    <div class="admin-content">

      <!-- Product list -->
      <div id="products-wrap"></div>

      <!-- Export modal -->
      <div class="modal-overlay" id="export-modal" style="display:none">
        <div class="modal">
          <div class="modal-header">
            <h3 class="modal-title">Exportar products.js</h3>
            <button class="btn-close-modal" id="close-export-modal">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
          </div>
          <div class="modal-body">
            <p style="font-size:13px;color:var(--text-2);margin-bottom:14px">
              Copiá este contenido, reemplazá el archivo <code>js/products.js</code> en tu repositorio y subí a GitHub. Cloudflare lo redespliega automáticamente.
            </p>
            <button class="btn btn-primary btn-sm" id="btn-copy-export" style="margin-bottom:12px">
              Copiar al portapapeles
            </button>
            <div class="export-box" id="export-content"></div>
          </div>
          <div class="modal-footer">
            <button class="btn btn-secondary" id="close-export-modal-2">Cerrar</button>
          </div>
        </div>
      </div>

    </div>
  </main>
</div>

<script src="../js/products.js"></script>
<script src="js/admin.js"></script>
<script>
requireAuth();
document.getElementById("btn-logout").addEventListener("click", (e) => { e.preventDefault(); logout(); });

// ── Render products ─────────────────────────────────────────
function renderProducts() {
  const wrap = document.getElementById("products-wrap");
  if (!window.VELOW_PRODUCTS || VELOW_PRODUCTS.length === 0) {
    wrap.innerHTML = `<div class="admin-card"><div class="empty-state"><p>No hay productos cargados.</p></div></div>`;
    return;
  }

  wrap.innerHTML = VELOW_PRODUCTS.map(product => `
    <div class="admin-card" style="margin-bottom:24px">
      <div class="admin-card-header">
        <div>
          <h2 class="admin-card-title">${product.nombre}</h2>
          <p style="font-size:12px;color:var(--text-3);margin-top:2px">
            ${product.categoria} · ${formatPriceAdmin(product.precio)}
            ${product.nuevo ? ' · <span class="chip">Nuevo</span>' : ''}
          </p>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <span style="font-size:12px;color:var(--text-3)">ID: ${product.id}</span>
        </div>
      </div>
      <div class="admin-table-wrap">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Talle</th>
              ${product.colores.map(c => `
                <th>
                  <span class="swatch">
                    <span class="swatch-dot" style="background:${c.hex}"></span>
                    ${c.nombre}
                  </span>
                </th>`).join("")}
            </tr>
          </thead>
          <tbody>
            ${product.talles.map(talle => `
              <tr>
                <td><strong>${talle}</strong></td>
                ${product.colores.map(color => {
                  const qty = getEffectiveStock(product.id, talle, color.id);
                  return `<td>
                    <div class="stock-cell">
                      <input type="number" class="stock-input" min="0"
                             value="${qty === null ? '' : qty}"
                             placeholder="?"
                             data-product="${product.id}"
                             data-talle="${talle}"
                             data-color="${color.id}"
                             title="${product.nombre} / ${color.nombre} / Talle ${talle}">
                      ${stockBadge(qty)}
                    </div>
                  </td>`;
                }).join("")}
              </tr>`).join("")}
          </tbody>
        </table>
      </div>
      <div style="padding:14px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end">
        <button class="btn btn-success btn-sm" onclick="saveProductStock('${product.id}')">
          ✓ Guardar stock de este producto
        </button>
      </div>
    </div>
  `).join("");
}

function saveProductStock(productId) {
  const inputs = document.querySelectorAll(`input[data-product="${productId}"]`);
  inputs.forEach(input => {
    const talle   = input.dataset.talle;
    const colorId = input.dataset.color;
    const raw     = input.value.trim();
    const qty     = raw === "" ? null : parseInt(raw);
    setStockOverride(productId, talle, colorId, isNaN(qty) ? null : qty);
  });
  renderProducts(); // re-render to update badges
  adminToast("✓ Stock guardado");
}

// ── Export modal ─────────────────────────────────────────────
document.getElementById("btn-export").addEventListener("click", () => {
  document.getElementById("export-content").textContent = generateProductsJS();
  document.getElementById("export-modal").style.display = "flex";
});

["close-export-modal","close-export-modal-2"].forEach(id => {
  document.getElementById(id).addEventListener("click", () => {
    document.getElementById("export-modal").style.display = "none";
  });
});

document.getElementById("btn-copy-export").addEventListener("click", () => {
  const text = document.getElementById("export-content").textContent;
  navigator.clipboard.writeText(text).then(() => adminToast("✓ Copiado al portapapeles"));
});

// ── Boot ─────────────────────────────────────────────────────
renderProducts();
</script>
</body>
</html>
