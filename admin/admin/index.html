<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Velow</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>

<!-- ════════════════════════════════════════════════════════════
     LOGIN SCREEN
     ════════════════════════════════════════════════════════════ -->
<div class="login-screen" id="login-screen">
  <div class="login-card">
    <p class="login-brand">VELOW</p>
    <p class="login-subtitle">Panel de Administración</p>
    <div class="login-error" id="login-error">Contraseña incorrecta.</div>
    <form id="login-form">
      <div class="form-group">
        <label class="form-label" for="login-pass">Contraseña</label>
        <input type="password" id="login-pass" placeholder="••••••••" autofocus>
      </div>
      <button type="submit" class="btn btn-primary btn-full" style="margin-top:8px">
        Ingresar
      </button>
    </form>
  </div>
</div>

<!-- ════════════════════════════════════════════════════════════
     DASHBOARD
     ════════════════════════════════════════════════════════════ -->
<div class="admin-layout" id="admin-layout" style="display:none">

  <!-- Sidebar -->
  <aside class="admin-sidebar">
    <div class="admin-logo">
      <span class="admin-logo-brand">VELOW</span>
      <span class="admin-logo-tag">Panel Admin</span>
    </div>
    <nav class="admin-nav">
      <div class="admin-nav-section">Tienda</div>
      <a href="index.html" class="admin-nav-link active" id="nav-dashboard">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Dashboard
      </a>
      <a href="productos.html" class="admin-nav-link" id="nav-productos">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 7H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
        Productos y Stock
      </a>
      <a href="pedidos.html" class="admin-nav-link" id="nav-pedidos">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        Pedidos
      </a>
      <div class="admin-nav-section" style="margin-top:16px">Herramientas</div>
      <a href="../index.html" target="_blank" class="admin-nav-link">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        Ver tienda
      </a>
    </nav>
    <div class="admin-sidebar-footer">
      Sesión activa
      <a href="#" id="btn-logout">Cerrar sesión</a>
    </div>
  </aside>

  <!-- Main -->
  <main class="admin-main">
    <div class="admin-topbar">
      <h1 class="admin-page-title">Dashboard</h1>
      <span style="font-size:12px;color:var(--text-3)" id="topbar-date"></span>
    </div>

    <div class="admin-content">

      <!-- Stats -->
      <div class="stats-grid" id="stats-grid">
        <!-- Rendered by JS -->
      </div>

      <!-- Recent orders -->
      <div class="admin-card">
        <div class="admin-card-header">
          <h2 class="admin-card-title">Pedidos recientes</h2>
          <a href="pedidos.html" class="btn btn-secondary btn-sm">Ver todos</a>
        </div>
        <div id="recent-orders-wrap">
          <!-- Rendered by JS -->
        </div>
      </div>

      <!-- Low stock alert -->
      <div class="admin-card">
        <div class="admin-card-header">
          <h2 class="admin-card-title">⚠️ Stock bajo o sin cargar</h2>
          <a href="productos.html" class="btn btn-secondary btn-sm">Gestionar stock</a>
        </div>
        <div id="low-stock-wrap">
          <!-- Rendered by JS -->
        </div>
      </div>

    </div>
  </main>
</div>

<script src="../js/products.js"></script>
<script src="js/admin.js"></script>
<script>
// ── Login ────────────────────────────────────────────────────
document.getElementById("login-form").addEventListener("submit", (e) => {
  e.preventDefault();
  const pw = document.getElementById("login-pass").value;
  if (login(pw)) {
    showDashboard();
  } else {
    document.getElementById("login-error").style.display = "block";
  }
});

document.getElementById("btn-logout").addEventListener("click", (e) => {
  e.preventDefault();
  logout();
});

function showDashboard() {
  document.getElementById("login-screen").style.display = "none";
  document.getElementById("admin-layout").style.display = "flex";
  renderDashboard();
}

// ── Dashboard ────────────────────────────────────────────────
function renderDashboard() {
  const orders = loadOrders();
  const date = new Date();
  document.getElementById("topbar-date").textContent =
    date.toLocaleDateString("es-AR", { weekday: "long", day: "numeric", month: "long" });

  // Stats
  const pending   = orders.filter(o => o.status === "pendiente").length;
  const confirmed = orders.filter(o => o.status === "confirmado").length;
  const sent      = orders.filter(o => o.status === "enviado").length;
  const totalRev  = orders.filter(o => o.status !== "cancelado")
                         .reduce((s, o) => s + (o.total || 0), 0);

  document.getElementById("stats-grid").innerHTML = `
    <div class="stat-card">
      <div class="stat-icon">📦</div>
      <div class="stat-label">Pedidos pendientes</div>
      <div class="stat-value" style="${pending > 0 ? "color:var(--warning)" : ""}">${pending}</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">✅</div>
      <div class="stat-label">Confirmados</div>
      <div class="stat-value" style="color:var(--success)">${confirmed}</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">🚚</div>
      <div class="stat-label">Enviados</div>
      <div class="stat-value">${sent}</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">💰</div>
      <div class="stat-label">Total facturado</div>
      <div class="stat-value" style="font-size:20px">${formatPriceAdmin(totalRev)}</div>
      <div class="stat-sub">Pedidos no cancelados</div>
    </div>
  `;

  // Recent orders (last 5)
  const recent = orders.slice(0, 5);
  if (recent.length === 0) {
    document.getElementById("recent-orders-wrap").innerHTML =
      `<div class="empty-state"><p>Aún no hay pedidos registrados.<br>
       <a href="pedidos.html" style="color:var(--accent)">Registrar primer pedido →</a></p></div>`;
  } else {
    document.getElementById("recent-orders-wrap").innerHTML = `
      <div class="admin-table-wrap">
        <table class="admin-table">
          <thead><tr>
            <th>ID</th><th>Cliente</th><th>Total</th><th>Estado</th><th>Fecha</th>
          </tr></thead>
          <tbody>${recent.map(o => `
            <tr>
              <td><code style="font-size:12px">${o.id}</code></td>
              <td>${o.nombre || "—"}</td>
              <td>${formatPriceAdmin(o.total || 0)}</td>
              <td>${statusBadge(o.status)}</td>
              <td style="color:var(--text-3);font-size:12px">${formatDate(o.fecha)}</td>
            </tr>`).join("")}
          </tbody>
        </table>
      </div>`;
  }

  // Low/missing stock
  const lowItems = [];
  if (window.VELOW_PRODUCTS) {
    VELOW_PRODUCTS.forEach(p => {
      if (!p.activo) return;
      p.talles.forEach(t => {
        p.colores.forEach(c => {
          const qty = getEffectiveStock(p.id, t, c.id);
          if (qty === null || qty === 0 || qty <= 2) {
            lowItems.push({ product: p, talle: t, color: c, qty });
          }
        });
      });
    });
  }

  if (lowItems.length === 0) {
    document.getElementById("low-stock-wrap").innerHTML =
      `<div class="empty-state"><p>✓ Todo el stock cargado y disponible</p></div>`;
  } else {
    document.getElementById("low-stock-wrap").innerHTML = `
      <div class="admin-table-wrap">
        <table class="admin-table">
          <thead><tr><th>Producto</th><th>Color</th><th>Talle</th><th>Stock</th></tr></thead>
          <tbody>${lowItems.slice(0, 20).map(i => `
            <tr>
              <td>${i.product.nombre}</td>
              <td><span class="swatch">
                <span class="swatch-dot" style="background:${i.color.hex}"></span>
                ${i.color.nombre}
              </span></td>
              <td>${i.talle}</td>
              <td>${stockBadge(i.qty)}</td>
            </tr>`).join("")}
          </tbody>
        </table>
      </div>`;
  }
}

// ── Boot ─────────────────────────────────────────────────────
if (isLoggedIn()) {
  showDashboard();
}
</script>
</body>
</html>
