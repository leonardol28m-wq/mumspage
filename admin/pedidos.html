<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pedidos — Velow Admin</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>

<div class="admin-layout">

  <!-- Sidebar -->
  <aside class="admin-sidebar">
    <div class="admin-logo">
      <span class="admin-logo-brand">VELOW</span>
      <span class="admin-logo-tag">Panel Admin</span>
    </div>
    <nav class="admin-nav">
      <div class="admin-nav-section">Tienda</div>
      <a href="index.html" class="admin-nav-link">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Dashboard
      </a>
      <a href="productos.html" class="admin-nav-link">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 7H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
        Productos y Stock
      </a>
      <a href="pedidos.html" class="admin-nav-link active">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        Pedidos
      </a>
      <div class="admin-nav-section" style="margin-top:16px">Herramientas</div>
      <a href="../index.html" target="_blank" class="admin-nav-link">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        Ver tienda
      </a>
    </nav>
    <div class="admin-sidebar-footer">
      Sesión activa
      <a href="#" id="btn-logout">Cerrar sesión</a>
    </div>
  </aside>

  <!-- Main -->
  <main class="admin-main">
    <div class="admin-topbar">
      <h1 class="admin-page-title">Pedidos</h1>
      <button class="btn btn-primary btn-sm" id="btn-new-order">
        + Registrar pedido
      </button>
    </div>

    <div class="admin-content">

      <!-- Filter tabs -->
      <div style="display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap">
        <button class="btn btn-secondary btn-sm filter-tab active" data-status="all">Todos</button>
        <button class="btn btn-secondary btn-sm filter-tab" data-status="pendiente">Pendientes</button>
        <button class="btn btn-secondary btn-sm filter-tab" data-status="confirmado">Confirmados</button>
        <button class="btn btn-secondary btn-sm filter-tab" data-status="enviado">Enviados</button>
        <button class="btn btn-secondary btn-sm filter-tab" data-status="cancelado">Cancelados</button>
      </div>

      <!-- Orders table -->
      <div class="admin-card">
        <div id="orders-wrap">
          <!-- Rendered by JS -->
        </div>
      </div>

    </div>
  </main>
</div>

<!-- ── Modal: New Order ──────────────────────────────────────── -->
<div class="modal-overlay" id="new-order-modal" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <h3 class="modal-title">Registrar pedido</h3>
      <button class="btn-close-modal" id="close-new-order">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <p style="font-size:13px;color:var(--text-2);margin-bottom:16px">
        Registrá el pedido recibido por WhatsApp para hacer el seguimiento.
      </p>
      <div class="form-group">
        <label class="form-label">Nombre del cliente *</label>
        <input type="text" id="n-nombre" placeholder="María González">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Teléfono / WhatsApp</label>
          <input type="text" id="n-tel" placeholder="+54 9 11...">
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" id="n-email" placeholder="maria@email.com">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Dirección de envío</label>
        <input type="text" id="n-dir" placeholder="Av. Corrientes 1234, Salta">
      </div>
      <div class="form-group">
        <label class="form-label">Detalle del pedido *</label>
        <textarea id="n-detalle" rows="3" placeholder="Ej: Buzo Clásico Oversize, color Crema, talle M x1"></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Total ($) *</label>
          <input type="number" id="n-total" placeholder="28500">
        </div>
        <div class="form-group">
          <label class="form-label">Estado inicial</label>
          <select id="n-status">
            <option value="pendiente">Pendiente</option>
            <option value="confirmado">Transferencia confirmada</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Notas internas</label>
        <input type="text" id="n-notas" placeholder="Opcional">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="close-new-order-2">Cancelar</button>
      <button class="btn btn-primary" id="save-new-order">Guardar pedido</button>
    </div>
  </div>
</div>

<!-- ── Modal: Order Detail ───────────────────────────────────── -->
<div class="modal-overlay" id="detail-modal" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <h3 class="modal-title" id="detail-modal-title">Pedido</h3>
      <button class="btn-close-modal" id="close-detail-modal">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body" id="detail-modal-body">
      <!-- Rendered by JS -->
    </div>
    <div class="modal-footer" id="detail-modal-footer">
      <!-- Rendered by JS -->
    </div>
  </div>
</div>

<script src="../js/products.js"></script>
<script src="js/admin.js"></script>
<script>
requireAuth();
document.getElementById("btn-logout").addEventListener("click", (e) => { e.preventDefault(); logout(); });

let activeFilter = "all";

// ── Render orders ─────────────────────────────────────────────
function renderOrders() {
  const allOrders = loadOrders();
  const orders = activeFilter === "all" ? allOrders : allOrders.filter(o => o.status === activeFilter);

  const wrap = document.getElementById("orders-wrap");

  if (orders.length === 0) {
    wrap.innerHTML = `<div class="empty-state">
      <p>${activeFilter === "all" ? "No hay pedidos registrados aún." : "No hay pedidos con este estado."}</p>
      ${activeFilter === "all" ? `<button onclick="document.getElementById('new-order-modal').style.display='flex'"
        class="btn btn-primary btn-sm" style="margin-top:12px">+ Registrar primer pedido</button>` : ""}
    </div>`;
    return;
  }

  wrap.innerHTML = `<div class="admin-table-wrap">
    <table class="admin-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Cliente</th>
          <th>Detalle</th>
          <th>Total</th>
          <th>Estado</th>
          <th>Fecha</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        ${orders.map(o => `
          <tr>
            <td><code style="font-size:12px">${o.id}</code></td>
            <td>
              <strong style="font-size:13px">${o.nombre || "—"}</strong><br>
              <span style="font-size:11px;color:var(--text-3)">${o.tel || ""}</span>
            </td>
            <td style="max-width:220px">
              <span style="font-size:12px;color:var(--text-2);white-space:pre-wrap">${(o.detalle||"").slice(0,80)}${o.detalle?.length > 80 ? "…" : ""}</span>
            </td>
            <td style="font-weight:600">${formatPriceAdmin(o.total || 0)}</td>
            <td>
              <select class="status-select" data-id="${o.id}"
                      style="font-size:12px;padding:4px 8px;width:auto">
                ${["pendiente","confirmado","enviado","cancelado"].map(s =>
                  `<option value="${s}" ${o.status===s?"selected":""}>${s.charAt(0).toUpperCase()+s.slice(1)}</option>`
                ).join("")}
              </select>
            </td>
            <td style="font-size:12px;color:var(--text-3);white-space:nowrap">${formatDate(o.fecha)}</td>
            <td>
              <div style="display:flex;gap:6px">
                <button class="btn btn-secondary btn-sm" onclick="openDetail('${o.id}')">Ver</button>
                <button class="btn btn-sm" style="color:var(--error)"
                        onclick="confirmDelete('${o.id}')">✕</button>
              </div>
            </td>
          </tr>`).join("")}
      </tbody>
    </table>
  </div>`;

  // Status change
  document.querySelectorAll(".status-select").forEach(sel => {
    sel.addEventListener("change", () => {
      updateOrderStatus(sel.dataset.id, sel.value);
      adminToast("✓ Estado actualizado");
      renderOrders();
    });
  });
}

// ── Filter tabs ───────────────────────────────────────────────
document.querySelectorAll(".filter-tab").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".filter-tab").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeFilter = btn.dataset.status;
    renderOrders();
  });
});

// ── New order modal ────────────────────────────────────────────
document.getElementById("btn-new-order").addEventListener("click", () => {
  document.getElementById("new-order-modal").style.display = "flex";
});
["close-new-order","close-new-order-2"].forEach(id => {
  document.getElementById(id).addEventListener("click", () => {
    document.getElementById("new-order-modal").style.display = "none";
  });
});

document.getElementById("save-new-order").addEventListener("click", () => {
  const nombre  = document.getElementById("n-nombre").value.trim();
  const detalle = document.getElementById("n-detalle").value.trim();
  const total   = parseFloat(document.getElementById("n-total").value);

  if (!nombre || !detalle || isNaN(total)) {
    alert("Por favor completá nombre, detalle y total.");
    return;
  }

  addOrder({
    nombre,
    tel:     document.getElementById("n-tel").value.trim(),
    email:   document.getElementById("n-email").value.trim(),
    dir:     document.getElementById("n-dir").value.trim(),
    detalle,
    total,
    notas:   document.getElementById("n-notas").value.trim(),
    status:  document.getElementById("n-status").value,
  });

  // Reset
  ["n-nombre","n-tel","n-email","n-dir","n-detalle","n-total","n-notas"].forEach(id => {
    document.getElementById(id).value = "";
  });

  document.getElementById("new-order-modal").style.display = "none";
  adminToast("✓ Pedido registrado");
  renderOrders();
});

// ── Detail modal ──────────────────────────────────────────────
function openDetail(id) {
  const orders = loadOrders();
  const o = orders.find(x => x.id === id);
  if (!o) return;

  document.getElementById("detail-modal-title").textContent = `Pedido ${o.id}`;
  document.getElementById("detail-modal-body").innerHTML = `
    <table style="width:100%;font-size:13px;border-collapse:collapse">
      ${[
        ["Cliente", o.nombre || "—"],
        ["Teléfono", o.tel ? `<a href="https://wa.me/${o.tel.replace(/\D/g,'')}" target="_blank" rel="noopener" style="color:var(--accent)">${o.tel}</a>` : "—"],
        ["Email", o.email || "—"],
        ["Dirección", o.dir || "—"],
        ["Total", `<strong>${formatPriceAdmin(o.total||0)}</strong>`],
        ["Estado", statusBadge(o.status)],
        ["Fecha", formatDate(o.fecha)],
      ].map(([k,v]) => `<tr>
        <td style="padding:8px 0;color:var(--text-2);width:36%;border-bottom:1px solid var(--border)">${k}</td>
        <td style="padding:8px 0;border-bottom:1px solid var(--border)">${v}</td>
      </tr>`).join("")}
    </table>
    <div style="margin-top:16px">
      <p style="font-size:12px;font-weight:500;color:var(--text-2);margin-bottom:6px">DETALLE DEL PEDIDO</p>
      <div style="background:var(--bg);border-radius:6px;padding:12px;font-size:13px;white-space:pre-wrap">${o.detalle||"—"}</div>
    </div>
    ${o.notas ? `<div style="margin-top:14px">
      <p style="font-size:12px;font-weight:500;color:var(--text-2);margin-bottom:6px">NOTAS</p>
      <p style="font-size:13px;color:var(--text-2)">${o.notas}</p>
    </div>` : ""}
  `;

  document.getElementById("detail-modal-footer").innerHTML = `
    <button class="btn btn-secondary" onclick="document.getElementById('detail-modal').style.display='none'">Cerrar</button>
    ${o.tel ? `<a href="https://wa.me/${o.tel.replace(/\D/g,'')}" target="_blank" rel="noopener" class="btn btn-primary">
      Contactar por WhatsApp
    </a>` : ""}
  `;

  document.getElementById("detail-modal").style.display = "flex";
}

document.getElementById("close-detail-modal").addEventListener("click", () => {
  document.getElementById("detail-modal").style.display = "none";
});

// ── Delete ────────────────────────────────────────────────────
function confirmDelete(id) {
  if (confirm("¿Eliminar este pedido? No se puede deshacer.")) {
    deleteOrder(id);
    adminToast("Pedido eliminado");
    renderOrders();
  }
}

// ── Boot ─────────────────────────────────────────────────────
renderOrders();
</script>
</body>
</html>
